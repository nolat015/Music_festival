<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página Web</title>

    <style>
        body {
            background-image: url("fondo.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            font-family: "Comic Sans MS", cursive, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contenido {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 40px;
            text-align: center;
            border-radius: 20px;
        }

        h1 {
            font-size: 60px;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
        }

        .caja-texto {
            background: linear-gradient(135deg, #ff4da6, #ff99cc);
            padding: 25px;
            border-radius: 20px;
            font-size: 22px;
            line-height: 1.6;
            color: white;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.7);
        }
    </style>

</head>
<body>

    <div class="contenido">
        <h1>Bienvenido a mi página</h1>

        <div class="caja-texto">
            Este es un texto genérico de ejemplo. Puedes usar este espacio para escribir cualquier contenido que desees mostrar en tu página web. Es un buen punto de partida para comenzar a crear tu propio sitio.
        </div>
    </div>

</body>
</html>
